services:
  backend:
    build: ./backend
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Empty → relative URLs, nginx proxies /api and /socket.io to backend
        VITE_BACKEND_URL: ""
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
